<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vagelis Bar | Privacy Policy</title>
    <link rel="icon" type="image/png" href="images/favico.png?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #001a33;
            --accent: #7b7674;
            --accent-glow: rgba(230, 126, 34, 0.4);
            --text: #f8f9fa;
            --bg-dark: #000b1a;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            background: radial-gradient(circle at center, #002b5b, #000b1a);
            color: var(--text);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: fixed;
            top: 0; width: 100%; z-index: 2000;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo { 
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem; 
            font-weight: bold; 
            letter-spacing: 3px;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .nav-links a { 
            color: white; 
            text-decoration: none; 
            margin: 0 20px; 
            font-weight: 400; 
            font-size: 0.95rem;
            transition: 0.4s; 
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute; width: 0; height: 2px; bottom: -5px; left: 0;
            background-color: var(--accent); transition: 0.4s;
        }

        .nav-links a:hover::after { width: 100%; }
        .nav-links a:hover { color: var(--accent); }

        .lang-switch { 
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 6px 15px; 
            border-radius: 30px; 
        }

        .lang-btn { background: none; border: none; color: white; cursor: pointer; font-weight: bold; font-size: 0.8rem; }

        /* --- Privacy Content --- */
        .content-container {
            max-width: 900px;
            margin: 180px auto 100px;
            padding: 60px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        h1 { 
            font-family: 'Playfair Display', serif;
            color: var(--accent); 
            font-size: 2.8rem;
            margin-bottom: 30px;
            text-align: center;
        }

        h2 { 
            font-family: 'Playfair Display', serif;
            color: var(--accent); 
            margin-top: 40px; 
            font-size: 1.6rem;
            border-left: 3px solid var(--accent);
            padding-left: 15px;
        }

        p, ul { color: rgba(255,255,255,0.85); font-size: 1.05rem; }
        
        li { margin-bottom: 12px; }

        b { color: var(--accent); }

        /* --- Footer --- */
        footer {
            padding: 50px;
            text-align: center;
            background: rgba(0,0,0,0.5);
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
            border-top: 1px solid var(--glass-border);
        }

        /* --- Mobile --- */
        @media (max-width: 768px) {
            .content-container { margin-top: 130px; padding: 30px; width: 90%; }
            h1 { font-size: 2rem; }
            nav { padding: 15px 5%; }
            .nav-links {
                display: none; flex-direction: column;
                position: absolute; top: 70px; left: 0; width: 100%;
                background: rgba(0, 11, 26, 0.98); padding: 30px 0;
            }
            .nav-links.active { display: flex; }
            .nav-links a { margin: 15px 0; text-align: center; }
            .menu-toggle { display: flex; order: 3; flex-direction: column; gap: 5px; cursor: pointer; }
            .bar { width: 25px; height: 2px; background: white; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">VAGELIS BAR</div>
        
        <div class="nav-links">
            <a href="index.html" id="nav-home">Αρχική</a>
            <a href="photos.html" id="nav-photos">Φωτογραφίες</a>
            <a href="history.html" id="nav-history">Ιστορία</a>
            <a href="contact.html" id="nav-contact">Επικοινωνία</a>
        </div>

        <div class="lang-switch">
            <button class="lang-btn" onclick="setLang('el')">GR</button> | 
            <button class="lang-btn" onclick="setLang('en')">EN</button>
        </div>

        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>

    <div class="content-container" id="privacy-content">
        </div>

<footer style="padding: 40px 0; text-align: center; border-top: 1px solid var(--border-color); font-size: 0.9rem; opacity: 0.8;">
    <div class="container">
        Website designed and developed with ❤️ by 
        <a href="https://rebrand.ly/kosg" target="_blank" style="color: var(--primary-color); text-decoration: none; font-weight: 700; transition: var(--transition); border-bottom: 1px dashed transparent;">
            Konstantinos Georgoudis
        </a>
        <br>
        <a href="privacy.html" style="color: rgba(255,255,255,0.3); text-decoration: none; font-size: 0.75rem; margin-top: 15px; display: inline-block; transition: 0.3s;">
            Πολιτική Απορρήτου / Privacy Policy
        </a>
    </div>
</footer>

    <script>
        const langData = {
            el: {
                navHome: "Αρχική", navPhotos: "Φωτογραφίες", navHistory: "Ιστορία", navContact: "Επικοινωνία",
                title: "Πολιτική Απορρήτου",
                intro: "Η παρούσα Πολιτική Απορρήτου επεξηγεί πώς το <b>Vagelis Bar</b> συλλέγει, χρησιμοποιεί και προστατεύει τα προσωπικά σας δεδομένα κατά την επίσκεψή σας στην ιστοσελίδα μας.",
                h1: "1. Συλλογή Δεδομένων",
                p1: "Συλλέγουμε μόνο τα δεδομένα που εσείς μας παρέχετε οικειοθελώς μέσω της φόρμας επικοινωνίας:",
                list1: "<li>Ονοματεπώνυμο</li><li>Διεύθυνση Email</li><li>Θέμα και κείμενο μηνύματος</li>",
                h2: "2. Χρήση των Πληροφοριών",
                p2: "Τα στοιχεία σας χρησιμοποιούνται αποκλειστικά για την απάντηση στα ερωτήματά σας και την παροχή πληροφοριών σχετικά με τις υπηρεσίες μας. Δεν μοιραζόμαστε τα δεδομένα σας με τρίτους για σκοπούς marketing.",
                h3: "3. Υπηρεσίες Τρίτων",
                p3: "Χρησιμοποιούμε το <b>FormSubmit</b> για την αποστολή email και το <b>Google Maps</b> για την εμφάνιση της τοποθεσίας μας.",
                h4: "4. Cookies",
                p4: "Χρησιμοποιούμε απλά cookies για να θυμόμαστε τις προτιμήσεις σας (π.χ. αν κλείσατε το banner ενημέρωσης).",
                h5: "5. Τα Δικαιώματά σας",
                p5: "Έχετε το δικαίωμα να ζητήσετε πρόσβαση ή διαγραφή των στοιχείων σας στο <b>contactvagbar@gmail.com</b>."
            },
            en: {
                navHome: "Home", navPhotos: "Photos", navHistory: "History", navContact: "Contact",
                title: "Privacy Policy",
                intro: "This Privacy Policy explains how <b>Vagelis Bar</b> collects, uses, and protects your personal data when you visit our website.",
                h1: "1. Data Collection",
                p1: "We only collect data that you voluntarily provide via the contact form:",
                list1: "<li>Full Name</li><li>Email Address</li><li>Subject and message text</li>",
                h2: "2. Use of Information",
                p2: "Your details are used exclusively to respond to your inquiries and provide information about our services. We do not share your data with third parties for marketing purposes.",
                h3: "3. Third Party Services",
                p3: "We use <b>FormSubmit</b> for email processing and <b>Google Maps</b> to display our location.",
                h4: "4. Cookies",
                p4: "We use simple cookies to remember your preferences (e.g., if you closed the notification banner).",
                h5: "5. Your Rights",
                p5: "You have the right to request access to or deletion of your data at <b>contactvagbar@gmail.com</b>."
            }
        };

        function setLang(lang) {
            document.getElementById('nav-home').innerText = langData[lang].navHome;
            document.getElementById('nav-photos').innerText = langData[lang].navPhotos;
            document.getElementById('nav-history').innerText = langData[lang].navHistory;
            document.getElementById('nav-contact').innerText = langData[lang].navContact;

            const container = document.getElementById('privacy-content');
            container.innerHTML = `
                <h1>${langData[lang].title}</h1>
                <p>${langData[lang].intro}</p>
                <h2>${langData[lang].h1}</h2>
                <p>${langData[lang].p1}</p>
                <ul>${langData[lang].list1}</ul>
                <h2>${langData[lang].h2}</h2>
                <p>${langData[lang].p2}</p>
                <h2>${langData[lang].h3}</h2>
                <p>${langData[lang].p3}</p>
                <h2>${langData[lang].h4}</h2>
                <p>${langData[lang].p4}</p>
                <h2>${langData[lang].h5}</h2>
                <p>${langData[lang].p5}</p>
            `;
        }

        setLang('el');
        
        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.querySelector('.nav-links');
        mobileMenu.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>
</body>
</html>
